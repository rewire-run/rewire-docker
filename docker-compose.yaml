# Rewire E2E scenarios
#
# Usage:
#   docker compose --profile dds up           # DDS multicast (default ROS 2)
#   docker compose --profile viewer up        # DDS + connect to Rerun viewer on host
#   docker compose --profile zenoh up         # Full Zenoh (rmw_zenoh_cpp + router)

services:

  # --- DDS profile ---
  # Standard ROS 2 DDS multicast discovery on a shared Docker bridge network.

  talker:
    image: ghcr.io/rewire-run/rewire:humble
    command: ros2 run demo_nodes_cpp talker
    networks: [ros]
    profiles: [dds]

  rewire-dds:
    image: ghcr.io/rewire-run/rewire:humble
    command: rewire record --all --save /data/recording.rrd
    networks: [ros]
    volumes: [./data:/data]
    depends_on: [talker]
    profiles: [dds]

  # --- Viewer profile ---
  # Same as DDS but connects to a Rerun viewer running on the host.
  # Start Rerun on your host first: rerun

  talker-viewer:
    image: ghcr.io/rewire-run/rewire:humble
    command: ros2 run demo_nodes_cpp talker
    networks: [ros]
    profiles: [viewer]

  rewire-viewer:
    image: ghcr.io/rewire-run/rewire:humble
    command: rewire record --all --connect rerun+http://host.docker.internal:9876/proxy
    networks: [ros]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [talker-viewer]
    profiles: [viewer]

  # --- Zenoh profile ---
  # ROS 2 nodes use rmw_zenoh_cpp, connecting to a central zenohd router.
  # Rewire discovers topics via Zenoh.

  zenoh-router:
    image: ghcr.io/rewire-run/rewire:humble
    command: zenohd --no-multicast-scouting --listen tcp/0.0.0.0:7447
    networks: [ros]
    profiles: [zenoh]

  talker-zenoh:
    image: ghcr.io/rewire-run/rewire:humble
    command: ros2 run demo_nodes_cpp talker
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
    network_mode: "service:zenoh-router"
    depends_on: [zenoh-router]
    profiles: [zenoh]

  rewire-zenoh:
    image: ghcr.io/rewire-run/rewire:humble
    command: rewire record --all --zenoh-connect tcp/zenoh-router:7447 --save /data/recording.rrd
    networks: [ros]
    volumes: [./data:/data]
    depends_on: [talker-zenoh]
    profiles: [zenoh]

networks:
  ros:
